<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Digital Invitation - HTM Annual Dinner</title>
  <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <style>
    :root {
      --gold-primary: #d4af37;
      --gold-light: #f3e5ab;
      --gold-dark: #aa7c11;
      --dark-bg: #0d0f12;
    }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--dark-bg);
      color: #ffffff;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      /* Elegant, luxury geometric wallpaper background pattern */
      background-image: 
        radial-gradient(at 50% 0%, rgba(212, 175, 55, 0.15) 0px, transparent 65%),
        linear-gradient(rgba(13, 15, 18, 0.85), rgba(13, 15, 18, 0.95)),
        url('https://www.transparenttextures.com/patterns/black-paper.png');
      background-size: cover;
      background-attachment: fixed;
    }

    /* Wrap the card so the button stays visible but outside the captured area if needed */
    .card-wrapper {
      width: 90%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .ticket-card {
      width: 100%;
      box-sizing: border-box;
      background: #161a21; /* Solid dark color for perfect image conversion */
      border: 1px solid var(--gold-primary);
      border-radius: 12px;
      padding: 35px 25px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      position: relative;
      overflow: hidden;
    }

    /* Formal gold accent line at the top */
    .ticket-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold-light), var(--gold-dark));
    }

    h2 {
      color: var(--gold-light);
      font-size: 22px;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin: 0 0 5px 0;
      font-weight: 300;
    }

    .subtitle {
      font-family: 'Segoe UI', sans-serif;
      font-size: 11px;
      color: #8a94a6;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 30px;
    }

    .qr-frame {
      display: inline-block;
      padding: 12px;
      background: #ffffff; /* Crisp contrast frame for flawless camera scans */
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      margin-bottom: 25px;
    }

    .guest-info {
      margin-top: 10px;
    }

    .label {
      font-family: 'Segoe UI', sans-serif;
      font-size: 10px;
      color: var(--gold-primary);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 2px;
    }

    .value {
      font-size: 20px;
      color: #ffffff;
      margin-bottom: 15px;
    }

    .footer-note {
      font-family: 'Segoe UI', sans-serif;
      font-size: 11px;
      color: #718096;
      margin-top: 25px;
      border-top: 1px solid rgba(214, 175, 87, 0.2);
      padding-top: 15px;
    }

    /* ✨ SLEEK GOLD SAVE PASS BUTTON STYLING */
    .download-btn {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--gold-light), var(--gold-primary));
      color: #0d0f12;
      border: none;
      border-radius: 6px;
      padding: 14px 24px;
      font-size: 13px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      width: 100%;
      margin-top: 20px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
      transition: all 0.2s ease;
    }

    .download-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <div class="card-wrapper">
    <div class="ticket-card" id="my-ticket">
      <h2>HTM Annual Dinner</h2>
      <div class="subtitle">Official Admission Pass</div>

      <div class="qr-frame">
        <div id="qrcode"></div>
      </div>

      <div class="guest-info">
        <div class="label">Guest Code</div>
        <div id="display-id" class="value" style="font-family: monospace; letter-spacing: 1px;">-</div>
      </div>

      <div class="footer-note">
        Please present this digital pass at the entrance concierge for rapid seating verification.
      </div>
    </div>

    <button id="download-pass-btn" class="download-btn">Save Pass to Phone</button>
  </div>

  <script>
    function getUrlParam(paramName) {
      var params = new URLSearchParams(window.location.search);
      return params.get(paramName);
    }

    window.onload = function() {
      var guestId = getUrlParam('id') || "HTM-GUEST";
      document.getElementById('display-id').innerText = guestId.toUpperCase();

      var qrCode = new QRCodeStyling({
        width: 240,
        height: 240,
        type: "svg",
        data: guestId,
        dotsOptions: {
          color: "#000000",
          type: "square"
        },
        backgroundOptions: {
          color: "#ffffff",
        },
        cornersSquareOptions: {
          color: "#000000",
          type: "square"
        },
        cornersDotOptions: {
          color: "#000000",
          type: "square"
        }
      });

      qrCode.append(document.getElementById("qrcode"));

      // 📥 SCREENSHOT ENGINE EXECUTION
      document.getElementById("download-pass-btn").addEventListener("click", function() {
        var ticketElement = document.getElementById("my-ticket");
        
        // Take a high-resolution snapshot of the card panel element
        html2canvas(ticketElement, {
          scale: 3,             // Enhances clarity so it looks crisp on high-end smartphone screens
          useCORS: true,        // Safely processes elements
          backgroundColor: null // Keeps background corners perfectly rounded
        }).then(function(canvas) {
          // Convert the snapshot result into a standard downloadable PNG image file string
          var imagePath = canvas.toDataURL("image/png");
          
          var downloadLink = document.createElement("a");
          downloadLink.download = "HTM_Dinner_Pass_" + guestId.toUpperCase() + ".png";
          downloadLink.href = imagePath;
          
          document.body.appendChild(downloadLink);
          downloadLink.click();
          document.body.removeChild(downloadLink);
        });
      });
    };
  </script>
</body>
</html>
