<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Digital Invitation - HTM Annual Dinner</title>
  <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
  <style>
    :root {
      --gold-primary: #d4af37;
      --gold-light: #f3e5ab;
      --gold-dark: #aa7c11;
      --dark-bg: #0d0f12;
    }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--dark-bg);
      color: #ffffff;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      /* Elegant, luxury geometric wallpaper background pattern */
      background-image: 
        radial-gradient(at 50% 0%, rgba(212, 175, 55, 0.15) 0px, transparent 65%),
        linear-gradient(rgba(13, 15, 18, 0.85), rgba(13, 15, 18, 0.95)),
        url('https://www.transparenttextures.com/patterns/black-paper.png');
      background-size: cover;
      background-attachment: fixed;
    }

    .ticket-card {
      width: 90%;
      max-width: 380px;
      background: rgba(22, 26, 33, 0.95);
      border: 1px solid var(--gold-primary);
      border-radius: 12px;
      padding: 35px 25px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      position: relative;
      overflow: hidden;
    }

    /* Formal gold accent line at the top */
    .ticket-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold-light), var(--gold-dark));
    }

    h2 {
      color: var(--gold-light);
      font-size: 22px;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin: 0 0 5px 0;
      font-weight: 300;
    }

    .subtitle {
      font-family: 'Segoe UI', sans-serif;
      font-size: 11px;
      color: #8a94a6;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 30px;
    }

    .qr-frame {
      display: inline-block;
      padding: 12px;
      background: #ffffff; /* Crisp contrast frame for flawless camera scans */
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      margin-bottom: 25px;
    }

    .guest-info {
      margin-top: 10px;
    }

    .label {
      font-family: 'Segoe UI', sans-serif;
      font-size: 10px;
      color: var(--gold-primary);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 2px;
    }

    .value {
      font-size: 20px;
      color: #ffffff;
      margin-bottom: 15px;
    }

    .footer-note {
      font-family: 'Segoe UI', sans-serif;
      font-size: 11px;
      color: #718096;
      margin-top: 25px;
      border-top: 1px solid rgba(214, 175, 87, 0.2);
      padding-top: 15px;
    }
  </style>
</head>
<body>

  <div class="ticket-card">
    <h2>HTM Annual Dinner</h2>
    <div class="subtitle">Official Admission Pass</div>

    <div class="qr-frame">
      <div id="qrcode"></div>
    </div>

    <div class="guest-info">
      <div class="label">Invitation Code</div>
      <div id="display-id" class="value" style="font-family: monospace; letter-spacing: 1px;">-</div>
    </div>

    <div class="footer-note">
      Please present this digital pass at the entrance concierge for rapid seating verification.
    </div>
  </div>

  <script>
    // Automatically parse the URL parameters sent from the WhatsApp link
    function getUrlParam(paramName) {
      var params = new URLSearchParams(window.location.search);
      return params.get(paramName);
    }

    window.onload = function() {
      // Extract the guest ID directly from the URL link
      var guestId = getUrlParam('id') || "HTM-GUEST";
      document.getElementById('display-id').innerText = guestId.toUpperCase();

      // HIGH-RELIABILITY CLASSIC MATRIX BUILDER
      // We force sharp black squares and square anchors for 0.5-second instant scanning response
      var qrCode = new QRCodeStyling({
        width: 240,
        height: 240,
        type: "svg",
        data: guestId,
        dotsOptions: {
          color: "#000000",     // Pure flat black for maximum camera contrast
          type: "square"        // Standard sharp squares so the scanner locks on instantly
        },
        backgroundOptions: {
          color: "#ffffff",     // Solid white crisp backing box
        },
        cornersSquareOptions: {
          color: "#000000",     // Pure black square outer alignment targets
          type: "square"
        },
        cornersDotOptions: {
          color: "#000000",     // Pure black inner tracking spots
          type: "square"
        }
      });

      qrCode.append(document.getElementById("qrcode"));
    };
  </script>
