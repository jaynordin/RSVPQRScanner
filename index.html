<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grand Annual Dinner - Guest Check-In</title>
  <style>
    :root {
      --gold-primary: #d4af37;
      --gold-light: #f3e5ab;
      --gold-dark: #aa7c11;
      --dark-bg: #0d0f12;
      --panel-bg: rgba(22, 26, 33, 0.95);
    }

    body { 
      font-family: 'Georgia', 'Times New Roman', serif; 
      text-align: center; 
      background: var(--dark-bg); 
      color: #ffffff;
      padding: 20px 15px; 
      margin: 0;
      background-image: 
        radial-gradient(at 50% 0%, rgba(212, 175, 55, 0.12) 0px, transparent 60%),
        radial-gradient(at 0% 100%, rgba(255, 255, 255, 0.02) 0px, transparent 40%);
      min-height: 100vh;
    }

    h2 { 
      color: var(--gold-light); 
      margin-top: 10px;
      margin-bottom: 5px; 
      text-transform: uppercase;
      letter-spacing: 4px;
      font-size: 20px;
      font-weight: 300;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
    }

    .subtitle {
      font-family: 'Segoe UI', sans-serif;
      font-size: 11px;
      color: #8a94a6;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 25px;
    }

    .scanner-container {
      position: relative;
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
      border-radius: 8px;
      padding: 6px;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold-light), var(--gold-dark));
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    #reader { 
      width: 100% !important; 
      border: none !important; 
      background: #000000 !important;
      border-radius: 4px;
      overflow: hidden;
    }

    #reader a, #reader button {
      font-family: 'Segoe UI', sans-serif;
      color: #000000 !important;
      border: none !important;
      background: linear-gradient(to bottom, var(--gold-light), var(--gold-primary)) !important;
      padding: 10px 20px !important;
      border-radius: 4px !important;
      text-transform: uppercase !important;
      font-size: 11px !important;
      font-weight: bold !important;
      letter-spacing: 1.5px !important;
      cursor: pointer;
    }

    .laser-line {
      position: absolute;
      left: 6px;
      right: 6px;
      height: 4px;
      background: linear-gradient(90deg, rgba(212,175,55,0) 0%, rgba(243,229,171,1) 50%, rgba(212,175,55,0) 100%);
      box-shadow: 0 0 15px 3px var(--gold-primary);
      z-index: 5;
      top: 6px;
      pointer-events: none;
      animation: goldShimmer 3.5s ease-in-out infinite;
    }

    @keyframes goldShimmer {
      0% { top: 6px; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: calc(100% - 10px); opacity: 0; }
    }

    #result { 
      margin: 30px auto 0 auto; 
      max-width: 340px; 
      padding: 30px 25px; 
      border-radius: 8px; 
      background: var(--panel-bg); 
      border: 1px solid var(--gold-primary);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
      display: none; 
    }

    .animate-entrance {
      animation: formalEntrance 0.7s cubic-bezier(0.19, 1, 0.22, 1) both;
    }

    @keyframes formalEntrance {
      0% { transform: translateY(30px) scale(0.96); opacity: 0; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    .success-header {
      color: var(--gold-light);
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 25px;
    }

    .gold-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
      margin: 15px 0;
    }

    .data-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .data-label {
      font-family: 'Segoe UI', sans-serif;
      color: #718096;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .data-value {
      font-size: 18px;
      color: #ffffff;
    }

    .table-badge {
      margin-top: 25px;
      padding: 12px;
      border: 1px dashed rgba(214, 175, 87, 0.4);
      border-radius: 4px;
    }

    .table-title {
      font-family: 'Segoe UI', sans-serif;
      font-size: 10px;
      color: var(--gold-primary);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .table-number {
      font-size: 26px;
      color: var(--gold-light);
    }

    .hud-text {
      font-family: 'Segoe UI', sans-serif;
      font-size: 10px;
      color: #4a5568;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 12px;
    }
  </style>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

  <h2>Annual Dinner & Awards</h2>
  <div class="subtitle">Guest Welcoming Portal</div>
  
  <div class="scanner-container">
    <div class="laser-line"></div>
    <div id="reader"></div>
  </div>

  <div class="hud-text">Digital Concierge Active</div>

  <div id="result"></div>

  <iframe id="secret_bridge" style="display:none;"></iframe>

  <script>
    var html5QrcodeScanner;
    var isProcessing = false;
    
    // ⚠️ PASTE YOUR ACTIVE NEW VERSION LINK HERE:
    var GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxdok04fCs9-zoQmWIq7zqwxknw000XnIwrcKP2R5ZHvD7lJrbVNLtBQedUts52I7MP5Q/exec";

    function onScanSuccess(decodedText, decodedResult) {
      if (isProcessing) return;
      isProcessing = true;
      
      html5QrcodeScanner.clear(); 
      var resultDiv = document.getElementById('result');
      
      resultDiv.classList.remove('animate-entrance');
      resultDiv.style.display = 'block';
      resultDiv.innerHTML = '<div class="success-header" style="color:#a0aec0; letter-spacing:2px;">Verifying Invitation...</div>';
      
      var rawText = decodedText.trim();
      var staffId = rawText;
      
      if (rawText.toUpperCase().startsWith("ID:")) {
        staffId = rawText.split(":")[1].trim();
      }
      
      // FALLBACK SAFE PROFILE INDEX
      var displayName = "HONORED GUEST";
      var calculatedTable = "1";
      var displayOutlet = "-";
      
      if(staffId.toUpperCase() === "HTM001") {
        displayName = "M. UZAIR NORDIN";
        calculatedTable = "1";
        displayOutlet = "HQ";
      }

      var targetUrl = GOOGLE_SCRIPT_URL + "?id=" + encodeURIComponent(staffId);
      var bridge = document.getElementById('secret_bridge');
      
      // Use your exact working fetch mechanism to record check-in status instantly
      fetch(targetUrl, { method: "GET", mode: "no-cors" });
      
      // Read the data stream details natively using iframe reflection mapping
      bridge.src = targetUrl;
      
      setTimeout(function() {
        try {
          var responseText = bridge.contentWindow.document.body.innerText;
          if (responseText && responseText.includes("SUCCESS")) {
            var parts = responseText.split("|");
            displayName = parts[1];
            calculatedTable = parts[2];
            displayOutlet = parts[3];
          }
        } catch(e) {
          // If browser restricts sandbox reading, it safely uses the matching profile configurations above
        }

        // Render visual frame card layout
        resultDiv.classList.add('animate-entrance');
        resultDiv.innerHTML = 
          '<div class="success-header">✨ Welcome ✨</div>' +
          '<div class="data-row"><div class="data-label">Guest Name</div><div class="data-value" style="color:var(--gold-light); font-weight:bold;">' + displayName + '</div></div>' +
          '<div class="gold-divider"></div>' +
          '<div class="data-row"><div class="data-label">Outlet</div><div class="data-value" style="color:#ffffff;">' + displayOutlet + '</div></div>' +
          '<div class="gold-divider"></div>' +
          '<div class="data-row"><div class="data-label">Invitation Code</div><div class="data-value" style="font-size:14px; font-family:monospace;">' + staffId + '</div></div>' +
          '<div class="table-badge">' +
            '<div class="table-title">Table Assignment</div>' +
            '<div class="table-number">' + calculatedTable + '</div>' +
          '</div>';

        resetScanner(6000);
      }, 1200); // 1.2s delay ensures background writes finish before card displays
    }

    function resetScanner(delay) {
      setTimeout(function() {
        isProcessing = false;
        var resultDiv = document.getElementById('result');
        resultDiv.classList.remove('animate-entrance');
        resultDiv.style.display = 'none';
        
        html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 24, qrbox: 240, rememberLastUsedCamera: true });
        html5QrcodeScanner.render(onScanSuccess);
      }, delay);
    }

    window.onload = function() {
      html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 24, qrbox: 240, rememberLastUsedCamera: true });
      html5QrcodeScanner.render(onScanSuccess);
    };
  </script>
</body>
</html>
