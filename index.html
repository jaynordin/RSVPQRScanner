<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grand Annual Dinner - Guest Check-In</title>
  <style>
    :root {
      --gold-primary: #d4af37;
      --gold-light: #f3e5ab;
      --gold-dark: #aa7c11;
      --dark-bg: #0d0f12;
      --panel-bg: rgba(22, 26, 33, 0.95);
    }

    body { 
      font-family: 'Georgia', 'Times New Roman', serif; 
      text-align: center; 
      background: var(--dark-bg); 
      color: #ffffff;
      padding: 20px 15px; 
      margin: 0;
      /* Luxury radial background gradient */
      background-image: 
        radial-gradient(at 50% 0%, rgba(212, 175, 55, 0.12) 0px, transparent 60%),
        radial-gradient(at 0% 100%, rgba(255, 255, 255, 0.02) 0px, transparent 40%);
      min-height: 100vh;
    }

    h2 { 
      color: var(--gold-light); 
      margin-top: 10px;
      margin-bottom: 5px; 
      text-transform: uppercase;
      letter-spacing: 4px;
      font-size: 20px;
      font-weight: 300;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
    }

    .subtitle {
      font-family: 'Segoe UI', sans-serif;
      font-size: 11px;
      color: #8a94a6;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 25px;
    }

    /* ELEGANT GOLD CAMERA CONTAINER */
    .scanner-container {
      position: relative;
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
      border-radius: 8px;
      padding: 6px;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold-light), var(--gold-dark));
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    #reader { 
      width: 100% !important; 
      border: none !important; 
      background: #000000 !important;
      border-radius: 4px;
      overflow: hidden;
    }

    /* Standardizing the scanner's internal buttons to fit the elite theme */
    #reader a, #reader button {
      font-family: 'Segoe UI', sans-serif;
      color: #000000 !important;
      border: none !important;
      background: linear-gradient(to bottom, var(--gold-light), var(--gold-primary)) !important;
      padding: 10px 20px !important;
      border-radius: 4px !important;
      text-transform: uppercase !important;
      font-size: 11px !important;
      font-weight: bold !important;
      letter-spacing: 1.5px !important;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    /* SHIMMERING GOLD SCAN EFFECT */
    .laser-line {
      position: absolute;
      left: 6px;
      right: 6px;
      height: 4px;
      background: linear-gradient(90deg, rgba(212,175,55,0) 0%, rgba(243,229,171,1) 50%, rgba(212,175,55,0) 100%);
      box-shadow: 0 0 15px 3px var(--gold-primary);
      z-index: 5;
      top: 6px;
      pointer-events: none;
      animation: goldShimmer 3.5s ease-in-out infinite;
    }

    @keyframes goldShimmer {
      0% { top: 6px; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: calc(100% - 10px); opacity: 0; }
    }

    /* PRESTIGE VIP RESULT PANEL */
    #result { 
      margin: 30px auto 0 auto; 
      max-width: 340px; 
      padding: 30px 25px; 
      border-radius: 8px; 
      background: var(--panel-bg); 
      border: 1px solid var(--gold-primary);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(214, 175, 87, 0.05);
      display: none; 
    }

    /* THE LUXURIOUS REVEAL ANIMATION */
    .animate-entrance {
      animation: formalEntrance 0.7s cubic-bezier(0.19, 1, 0.22, 1) both;
    }

    @keyframes formalEntrance {
      0% { 
        transform: translateY(30px) scale(0.96); 
        opacity: 0;
      }
      100% { 
        transform: translateY(0) scale(1); 
        opacity: 1;
      }
    }

    .success-header {
      color: var(--gold-light);
      font-size: 16px;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 25px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

      height: 1px;
      background: linear-gradient(90deg,
