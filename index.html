<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>HTM Grand Annual Dinner - Guest Check-In</title>
  <style>
    :root {
      --gold-primary: #d4af37;
      --gold-light: #f3e5ab;
      --gold-dark: #aa7c11;
      --dark-bg: #0d0f12;
      --panel-bg: rgba(22, 26, 33, 0.90);
    }

    body { 
      font-family: 'Georgia', 'Times New Roman', serif; 
      text-align: center; 
      background: var(--dark-bg); 
      color: #ffffff;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 🏛️ FLOATING HEADER CONTROLS */
    .header-overlay {
      position: relative;
      z-index: 10;
      padding-top: 25px;
      padding-bottom: 10px;
      background: linear-gradient(to bottom, rgba(13, 15, 18, 0.9) 0%, rgba(13, 15, 18, 0.4) 70%, transparent 100%);
      pointer-events: none; /* Allows user to click through header to hit scanner buttons if overlapping */
    }

    h2 { 
      color: var(--gold-light); 
      margin: 0 0 5px 0; 
      text-transform: uppercase;
      letter-spacing: 4px;
      font-size: 22px;
      font-weight: 300;
      text-shadow: 0 3px 6px rgba(0, 0, 0, 0.9);
    }

    .subtitle {
      font-family: 'Segoe UI', sans-serif;
      font-size: 11px;
      color: #8a94a6;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin: 0;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
    }

    /* 🎥 FULL SCREEN IMMERSIVE CAMERA CONTAINER */
    .scanner-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      background: #000;
    }

    #reader { 
      width: 100% !important; 
      height: 100% !important;
      background: #000000 !important;
      border: none !important;
    }
    
    /* Forces the native HTML video asset to object-fit fill the viewport screen boundary */
    #reader video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      transform: scaleX(-1);
      -webkit-transform: scaleX(-1);
    }

    /* Clears native library dashboard layouts to keep ui minimalist */
    #reader __dashboard {
      padding-left: 10px !important;
      padding-right: 10px !important;
    }

    #reader a, #reader button {
      font-family: 'Segoe UI', sans-serif;
      color: #000000 !important;
      border: none !important;
      background: linear-gradient(to bottom, var(--gold-light), var(--gold-primary)) !important;
      padding: 12px 24px !important;
      border-radius: 4px !important;
      text-transform: uppercase !important;
      font-size: 12px !important;
      font-weight: bold !important;
      letter-spacing: 1.5px !important;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(0,0,0,0.5);
      margin: 15px auto !important;
      display: inline-block;
      pointer-events: auto; /* Makes button clickable over overlays */
    }

    /* ⚡ CINEMATIC HORIZONTAL SCANNING RADAR LINE */
    .laser-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, rgba(212,175,55,0) 0%, rgba(243,229,171,1) 50%, rgba(212,175,55,0) 100%);
      box-shadow: 0 0 20px 4px var(--gold-primary);
      z-index: 5;
      top: 0;
      pointer-events: none;
      animation: fullScreenLaser 4s ease-in-out infinite;
    }

    @keyframes fullScreenLaser {
      0% { top: 0%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    /* 🏷️ FLOATING GUEST RESULT CARD PANEL */
    #result { 
      position: fixed;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      max-width: 350px; 
      padding: 25px 20px; 
      border-radius: 12px; 
      background: var(--panel-bg); 
      border: 1px solid var(--gold-primary);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px); /* Elegant blur context over camera stream layer */
      -webkit-backdrop-filter: blur(8px);
      z-index: 10;
      display: none; 
    }

    .animate-entrance {
      animation: formalEntrance 0.5s cubic-bezier(0.19, 1, 0.22, 1) both;
    }

    @keyframes formalEntrance {
      0% { transform: translate(-50%, 40px) scale(0.95); opacity: 0; }
      100% { transform: translate(-50%, 0) scale(1); opacity: 1; }
    }

    .success-header {
      color: var(--gold-light);
      font-size: 16px;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 20px;
    }

    .gold-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
      margin: 12px 0;
    }

    .data-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 12px;
    }
    
    .data-label {
      font-family: 'Segoe UI', sans-serif;
      color: #a0aec0;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 2px;
    }

    .data-value {
      font-size: 18px;
      color: #ffffff;
    }

    .table-badge {
      margin-top: 18px;
      padding: 10px;
      border: 1px dashed rgba(214, 175, 87, 0.4);
      border-radius: 4px;
      background: rgba(214, 175, 87, 0.05);
    }

    .table-title {
      font-family: 'Segoe UI', sans-serif;
      font-size: 10px;
      color: var(--gold-primary);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .table-number {
      font-size: 28px;
      color: var(--gold-light);
      font-weight: bold;
    }

    .hud-text {
      position: fixed;
      top: 90px;
      left: 0;
      width: 100%;
      font-family: 'Segoe UI', sans-serif;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 2px;
      text-transform: uppercase;
      z-index: 10;
      pointer-events: none;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
</head>
<body>

  <div class="header-overlay">
    <h2>HTM Annual Dinner</h2>
    <div class="subtitle">Guest Welcoming Portal</div>
  </div>
  
  <div class="hud-text">Digital Concierge Active</div>

  <div class="scanner-container">
    <div class="laser-line"></div>
    <div id="reader"></div>
  </div>

  <div id="result"></div>

  <script>
    var html5QrcodeScanner;
    var isProcessing = false;
    
    var GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxdok04fCs9-zoQmWIq7zqwxknw000XnIwrcKP2R5ZHvD7lJrbVNLtBQedUts52I7MP5Q/exec";

    function speakPersonalizedWelcome(name, table) {
      try {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel(); 

          var cleanName = name.split('(')[0].trim(); 
          var customSpeechText = "Weeeelcome, " + cleanName + ". Your table assignment is " + table + ". Please enjoy the show.";
          
          var utterance = new SpeechSynthesisUtterance(customSpeechText);
          var voices = window.speechSynthesis.getVoices();
          
          var premiumVoice = voices.find(function(v) {
            return v.name.includes('Premium') || 
                   v.name.includes('Natural') || 
                   v.name.includes('Google US English') || 
                   v.name.includes('Samantha') || 
                   v.name.includes('Aria');
          });

          if (premiumVoice) {
            utterance.voice = premiumVoice;
          }

          utterance.rate = 0.78;  
          utterance.pitch = 1.02; 

          window.speechSynthesis.speak(utterance);
        }
      } catch (e) {
        console.error("Personalized audio processing bypass:", e);
      }
    }

    function unlockAudioEngine() {
      if ('speechSynthesis' in window) {
        var dummyUtterance = new SpeechSynthesisUtterance("");
        window.speechSynthesis.speak(dummyUtterance);
      }
    }

    function onScanSuccess(decodedText, decodedResult) {
      if (isProcessing) return;
      isProcessing = true;
      
      var resultDiv = document.getElementById('result');
      resultDiv.classList.remove('animate-entrance');
      resultDiv.style.display = 'block';
      resultDiv.innerHTML = '<div class="success-header" style="color:#a0aec0; letter-spacing:2px;">Verifying Invitation...</div>';
      
      var rawText = decodedText.trim();
      var staffId = rawText;
      
      if (rawText.includes(":")) {
        var partsOfText = rawText.split(":");
        staffId = partsOfText[partsOfText.length - 1].trim();
      }
      
      var scriptId = 'google_jsonp_bridge';
      var oldScript = document.getElementById(scriptId);
      if (oldScript) oldScript.parentNode.removeChild(oldScript);
      
      window.handleGoogleResponse = function(responseString) {
        html5QrcodeScanner.clear().then(function() {
          var parts = responseString.split("|");
          
          if (parts[0] === "SUCCESS") {
            var displayName = parts[1];    
            var calculatedTable = parts[2]; 
            var displayOutlet = parts[3];   
            
            speakPersonalizedWelcome(displayName, calculatedTable);
            
            resultDiv.classList.add('animate-entrance');
            resultDiv.innerHTML = 
              '<div class="success-header">✨ Welcome ✨</div>' +
              '<div class="data-row"><div class="data-label">Guest Name</div><div class="data-value" style="color:var(--gold-light); font-weight:bold;">' + displayName + '</div></div>' +
              '<div class="gold-divider"></div>' +
              '<div class="data-row"><div class="data-label">Outlet</div><div class="data-value" style="color:#ffffff;">' + displayOutlet + '</div></div>' +
              '<div class="gold-divider"></div>' +
              '<div class="data-row"><div class="data-label">Staff Code</div><div class="data-value" style="font-size:14px; font-family:monospace;">' + staffId + '</div></div>' +
              '<div class="table-badge">' +
                '<div class="table-title">Table Assignment</div>' +
                '<div class="table-number">' + calculatedTable + '</div>' +
              '</div>';

            resetScanner(7000); 
          } else {
            resultDiv.classList.add('animate-entrance');
            resultDiv.innerHTML = "<h3 style='color:#fc8181; margin-top:0;'>Invitation Unrecognized</h3><p style='font-size:13px; margin-bottom:0;'>ID " + staffId + " is not registered on the seating charts.</p>";
            resetScanner(4000);
          }
        }).catch(function(err) {
          console.error("Camera reset issue: ", err);
          isProcessing = false;
        });
      };

      var jsonpUrl = GOOGLE_SCRIPT_URL + "?id=" + encodeURIComponent(staffId) + "&callback=handleGoogleResponse";
      var script = document.createElement('script');
      script.id = scriptId;
      script.src = jsonpUrl;
      
      script.onerror = function() {
        resultDiv.classList.add('animate-entrance');
        resultDiv.innerHTML = "<h3 style='color:#fc8181; margin-top:0;'>Connection Timeout</h3><p style='font-size:13px; margin-bottom:0;'>Could not reach the database script.</p>";
        resetScanner(4000);
      };
      
      document.body.appendChild(script);
    }

    function initScanner() {
      // 🛠️ Modified configuration parameters to eliminate restrictive framing bounding rules
      html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
        fps: 24, 
        rememberLastUsedCamera: true,
        supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
      }, false);
      html5QrcodeScanner.render(onScanSuccess, function(error) {});
    }

    function resetScanner(delay) {
      setTimeout(function() {
        isProcessing = false;
        var resultDiv = document.getElementById('result');
        resultDiv.classList.remove('animate-entrance');
        resultDiv.style.display = 'none';
        initScanner();
      }, delay);
    }

    window.onload = function() {
      initScanner();
      
      document.body.addEventListener('click', unlockAudioEngine, { once: true });
      document.body.addEventListener('touchstart', unlockAudioEngine, { once: true });
      
      if ('speechSynthesis' in window) {
        window.speechSynthesis.getVoices();
      }
    };
  </script>
</body>
</html>
